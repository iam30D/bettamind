workflows:
  ios-simulator-unsigned:
    name: iOS Simulator Unsigned Validation
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: 16.4
      vars:
        BETTAMIND_ANDROID_APPLICATION_ID: dev.bettamind.placeholder
        BETTAMIND_IOS_BUNDLE_ID: dev.bettamind.placeholder
    scripts:
      - name: Show tool versions
        script: |
          sw_vers
          xcodebuild -version
          java -version
      - name: Validate Gradle wrapper
        script: |
          test -f gradle/wrapper/gradle-wrapper.jar
          chmod +x ./gradlew
          ./gradlew --version
      - name: Run shared iOS simulator tests
        script: ./gradlew :shared:iosSimulatorArm64Test --stacktrace
      - name: Compile Kotlin iOS targets
        script: |
          ./gradlew :shared:compileKotlinIosX64 :shared:compileKotlinIosSimulatorArm64 :shared:compileKotlinIosArm64 --stacktrace
      - name: Resolve iOS Swift packages
        script: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -resolvePackageDependencies
      - name: Build unsigned iOS simulator app with xcodebuild
        script: |
          set -o pipefail
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            BETTAMIND_IOS_BUNDLE_ID="$BETTAMIND_IOS_BUNDLE_ID" \
            CODE_SIGNING_ALLOWED=NO \
            build | tee xcodebuild-ios-simulator.log
      - name: Run app-hosted iOS encrypted storage validation
        script: |
          set -euo pipefail
          DEVICE_NAME="iPhone 16"
          xcrun simctl boot "$DEVICE_NAME" || true
          xcrun simctl bootstatus booted -b

          APP_PATH="$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Debug-iphonesimulator/Bettamind.app" -print -quit)"
          test -d "$APP_PATH"

          mkdir -p "$CM_BUILD_DIR/build"
          VALIDATION_DIR="$(mktemp -d "$CM_BUILD_DIR/build/ios-storage-validation.XXXXXX")"
          VALIDATION_APP_PATH="$VALIDATION_DIR/Bettamind.app"
          ditto "$APP_PATH" "$VALIDATION_APP_PATH"

          ENTITLEMENTS_FILE="$VALIDATION_DIR/BettamindValidation.entitlements"
          KEYCHAIN_GROUP="BETTAMINDA.$BETTAMIND_IOS_BUNDLE_ID"
          cat > "$ENTITLEMENTS_FILE" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>application-identifier</key>
            <string>$KEYCHAIN_GROUP</string>
            <key>com.apple.developer.team-identifier</key>
            <string>BETTAMINDA</string>
            <key>keychain-access-groups</key>
            <array>
              <string>$KEYCHAIN_GROUP</string>
            </array>
          </dict>
          </plist>
          EOF

          while IFS= read -r -d '' framework; do
            codesign --force --sign - --timestamp=none "$framework"
          done < <(find "$VALIDATION_APP_PATH" -type d -name "*.framework" -print0)
          while IFS= read -r -d '' library; do
            codesign --force --sign - --timestamp=none "$library"
          done < <(find "$VALIDATION_APP_PATH" -type f -name "*.dylib" -print0)
          codesign --force --sign - --timestamp=none --entitlements "$ENTITLEMENTS_FILE" "$VALIDATION_APP_PATH"
          codesign --display --entitlements :- "$VALIDATION_APP_PATH" > ios-storage-validation-entitlements.log

          xcrun simctl uninstall booted "$BETTAMIND_IOS_BUNDLE_ID" || true
          xcrun simctl install booted "$VALIDATION_APP_PATH"
          CONTAINER="$(xcrun simctl get_app_container booted "$BETTAMIND_IOS_BUNDLE_ID" data)"
          RESULT_FILE="$CONTAINER/tmp/bettamind-ios-storage-validation.txt"
          rm -f "$RESULT_FILE"

          SIMCTL_CHILD_BETTAMIND_IOS_STORAGE_VALIDATION=1 xcrun simctl launch \
            --terminate-running-process \
            booted \
            "$BETTAMIND_IOS_BUNDLE_ID" 2>&1 | tee ios-storage-validation-launch.log

          for _ in $(seq 1 30); do
            if [ -f "$RESULT_FILE" ]; then
              break
            fi
            sleep 1
          done

          test -f "$RESULT_FILE"
          cat "$RESULT_FILE" | tee ios-storage-validation.log
          grep -q '^PASS:' "$RESULT_FILE"
    artifacts:
      - xcodebuild-ios-simulator.log
      - ios-storage-validation-entitlements.log
      - ios-storage-validation-launch.log
      - ios-storage-validation.log
      - "**/build/reports/**"
      - "**/build/test-results/**"
      - "$HOME/Library/Logs/DiagnosticReports/*.crash"

  ios-signed-release-placeholder:
    name: Disabled Signed iOS Release Placeholder
    instance_type: mac_mini_m2
    max_build_duration: 10
    environment:
      xcode: 16.4
    triggering:
      events: []
    scripts:
      - name: Signing intentionally disabled
        script: |
          echo "Signed iOS release is intentionally disabled in Phase 1."
          echo "Configure Codemagic secure signing credentials only in a later approved phase."
