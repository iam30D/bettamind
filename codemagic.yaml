workflows:
  ios-simulator-unsigned:
    name: iOS Simulator Unsigned Validation
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: 16.4
      vars:
        BETTAMIND_ANDROID_APPLICATION_ID: dev.bettamind.placeholder
        BETTAMIND_IOS_BUNDLE_ID: dev.bettamind.placeholder
    scripts:
      - name: Show tool versions
        script: |
          sw_vers
          xcodebuild -version
          java -version
      - name: Validate Gradle wrapper
        script: |
          test -f gradle/wrapper/gradle-wrapper.jar
          chmod +x ./gradlew
          ./gradlew --version
      - name: Run shared iOS simulator tests
        script: ./gradlew :shared:iosSimulatorArm64Test --stacktrace
      - name: Compile Kotlin iOS targets
        script: |
          ./gradlew :shared:compileKotlinIosX64 :shared:compileKotlinIosSimulatorArm64 :shared:compileKotlinIosArm64 --stacktrace
      - name: Resolve iOS Swift packages
        script: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -resolvePackageDependencies
      - name: Build unsigned iOS simulator app with xcodebuild
        script: |
          set -o pipefail
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            BETTAMIND_IOS_BUNDLE_ID="$BETTAMIND_IOS_BUNDLE_ID" \
            CODE_SIGNING_ALLOWED=NO \
            build | tee xcodebuild-ios-simulator.log
      - name: Run app-hosted iOS encrypted storage validation
        script: |
          set -euo pipefail
          DEVICE_NAME="iPhone 16"
          xcrun simctl boot "$DEVICE_NAME" || true
          xcrun simctl bootstatus booted -b

          VALIDATION_DERIVED_DATA="$CM_BUILD_DIR/build/ios-storage-validation-derived-data"
          set -o pipefail
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath "$VALIDATION_DERIVED_DATA" \
            BETTAMIND_IOS_BUNDLE_ID="$BETTAMIND_IOS_BUNDLE_ID" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_ENTITLEMENTS=iosApp/StorageValidation.entitlements \
            build | tee xcodebuild-ios-storage-validation.log

          VALIDATION_APP_PATH="$(find "$VALIDATION_DERIVED_DATA" -path "*/Build/Products/Debug-iphonesimulator/Bettamind.app" -print -quit)"
          test -d "$VALIDATION_APP_PATH"
          codesign --display --entitlements :- "$VALIDATION_APP_PATH" > ios-storage-validation-entitlements.log 2>ios-storage-validation-codesign-display.log
          KEYCHAIN_GROUP="$(/usr/libexec/PlistBuddy -c 'Print :keychain-access-groups:0' ios-storage-validation-entitlements.log 2>/dev/null || true)"
          echo "${KEYCHAIN_GROUP:-<none>}" | tee ios-storage-validation-keychain-group.log

          xcrun simctl uninstall booted "$BETTAMIND_IOS_BUNDLE_ID" || true
          xcrun simctl install booted "$VALIDATION_APP_PATH"
          CONTAINER="$(xcrun simctl get_app_container booted "$BETTAMIND_IOS_BUNDLE_ID" data)"
          RESULT_FILE="$CONTAINER/tmp/bettamind-ios-storage-validation.txt"
          rm -f "$RESULT_FILE"

          if [ -n "$KEYCHAIN_GROUP" ]; then
            SIMCTL_CHILD_BETTAMIND_IOS_STORAGE_VALIDATION=1 \
            SIMCTL_CHILD_BETTAMIND_IOS_STORAGE_KEYCHAIN_ACCESS_GROUP="$KEYCHAIN_GROUP" \
            xcrun simctl launch \
              --terminate-running-process \
              booted \
              "$BETTAMIND_IOS_BUNDLE_ID" 2>&1 | tee ios-storage-validation-launch.log
          else
            SIMCTL_CHILD_BETTAMIND_IOS_STORAGE_VALIDATION=1 \
            xcrun simctl launch \
              --terminate-running-process \
              booted \
              "$BETTAMIND_IOS_BUNDLE_ID" 2>&1 | tee ios-storage-validation-launch.log
          fi

          for _ in $(seq 1 30); do
            if [ -f "$RESULT_FILE" ]; then
              break
            fi
            sleep 1
          done

          test -f "$RESULT_FILE"
          cat "$RESULT_FILE" | tee ios-storage-validation.log
          grep -q '^PASS:' "$RESULT_FILE"
    artifacts:
      - xcodebuild-ios-simulator.log
      - xcodebuild-ios-storage-validation.log
      - ios-storage-validation-codesign-display.log
      - ios-storage-validation-entitlements.log
      - ios-storage-validation-keychain-group.log
      - ios-storage-validation-launch.log
      - ios-storage-validation.log
      - "**/build/reports/**"
      - "**/build/test-results/**"
      - "$HOME/Library/Logs/DiagnosticReports/*.crash"

  ios-testflight-release:
    name: iOS TestFlight Release
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: bettamind-app-store-connect
    environment:
      xcode: 16.4
      groups:
        - bettamind-testflight
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BETTAMIND_IOS_BUNDLE_ID
    triggering:
      events: []
    scripts:
      - name: Show tool versions
        script: |
          sw_vers
          xcodebuild -version
          java -version
      - name: Validate release environment
        script: |
          set -euo pipefail
          : "${BETTAMIND_IOS_BUNDLE_ID:?Set BETTAMIND_IOS_BUNDLE_ID in Codemagic group bettamind-testflight.}"

          case "$BETTAMIND_IOS_BUNDLE_ID" in
            dev.bettamind.placeholder|*placeholder*)
              echo "BETTAMIND_IOS_BUNDLE_ID must be the owner-controlled App Store bundle identifier."
              exit 1
              ;;
          esac

          echo "Bundle identifier: $BETTAMIND_IOS_BUNDLE_ID"
          echo "Codemagic build number: ${BUILD_NUMBER:-1}"
      - name: Validate Gradle wrapper
        script: |
          test -f gradle/wrapper/gradle-wrapper.jar
          chmod +x ./gradlew
          ./gradlew --version
      - name: Run release readiness checks
        script: ./gradlew phaseTwelveCheck --stacktrace
      - name: Resolve iOS Swift packages
        script: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -resolvePackageDependencies
      - name: Stamp TestFlight build metadata
        script: |
          set -euo pipefail
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion ${BUILD_NUMBER:-1}" \
            iosApp/iosApp/Info.plist
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleShortVersionString ${BETTAMIND_IOS_MARKETING_VERSION:-0.1.0}" \
            iosApp/iosApp/Info.plist
      - name: Set up App Store code signing
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          set -o pipefail
          xcode-project build-ipa \
            --project iosApp/iosApp.xcodeproj \
            --scheme iosApp | tee xcodebuild-ios-testflight.log
    artifacts:
      - build/ios/ipa/*.ipa
      - xcodebuild-ios-testflight.log
      - "**/build/reports/**"
      - "**/build/test-results/**"
      - "$HOME/Library/Developer/Xcode/DerivedData/**/Logs/**/*.xcactivitylog"
      - "$HOME/Library/Logs/DiagnosticReports/*.crash"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
